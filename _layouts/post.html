<!DOCTYPE html>
<html lang="{{ page.lang | default: 'fr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="/style.css">
  {% seo %}
</head>
<body>
  {% include header.html %}
  <main class="post-container">
    <article class="post">
      <h1>{{ page.title }}</h1>
      <div class="post-meta">
        <span class="post-date">{{ page.date | date: "%d %B %Y" }}</span>
        {% if page.author %}
        <span class="post-author">par {{ page.author }}</span>
        {% endif %}
      </div>
      <div class="post-content">
        {{ content }}
      </div>
      <div class="post-footer">
        <a href="/blog/" class="back-to-blog">← Retour au blog</a>
      </div>
    </article>
  </main>
  {% include footer.html %}
</body>
</html>
